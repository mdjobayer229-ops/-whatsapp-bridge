<!DOCTYPE html>

<html lang="bn">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Share Token Widget</title>

<style>

:root{--bg:#f8fafc;--card:#fff;--line:#e5e7eb;--text:#1f2937;--muted:#64748b;--blue:#2563eb}

*{box-sizing:border-box}

html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}

.wrap{width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(15,23,42,.05)}

.inner{padding:12px}

.hero{padding:14px 12px;border:1px solid #dbe6ff;border-radius:14px;background:linear-gradient(180deg,#f7faff 0,#eef4ff 100%);text-align:center}

.title{margin:0;font-size:18px;line-height:1.25;font-weight:800;color:#17324d}

.sub{margin-top:6px;font-size:12px;line-height:1.45;color:var(--muted)}

.summary{display:flex;gap:10px;margin-top:12px}

.sumcard{flex:1;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 10px;text-align:center;cursor:pointer;touch-action:manipulation}

.sumcard:active,.tab:active{transform:scale(.99)}

.sumicon{font-size:18px;line-height:1;margin-bottom:4px}

.label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px}

.value{font-size:28px;line-height:1;font-weight:800;color:#111827}

.hint{margin-top:6px;font-size:10px;color:#94a3b8;line-height:1.3}

.msgbox{margin-top:12px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}

.msg{min-height:96px;max-height:150px;overflow:auto;padding:12px;border-radius:12px;border:1px solid #eef2f7;background:#f8fafc;white-space:pre-wrap;font-size:13px;line-height:1.7;color:#334155;word-break:break-word}

.section{margin-top:12px;text-align:center}

.section-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700}

.foot{margin-top:10px;text-align:center;font-size:11px;color:#94a3b8}

#flash{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111827;color:#fff;font-size:13px;font-weight:700;padding:10px 16px;border-radius:999px;z-index:99999;box-shadow:0 10px 30px rgba(0,0,0,.2)}

#overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:9998}

#modal{display:none;position:fixed;left:0;right:0;bottom:0;z-index:9999;max-height:78vh;overflow:auto;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.14);padding:14px 12px 18px}

.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}

.modal-title{font-size:14px;font-weight:800;color:#111827}

.x{width:28px;height:28px;border:none;border-radius:999px;background:#f3f4f6;color:#6b7280;font-size:16px;cursor:pointer;line-height:1}

.tabrow{display:flex;gap:8px;margin-bottom:10px}

.tab{flex:1;appearance:none;border:1px solid #dbe3ee;background:#fff;border-radius:14px;padding:10px 8px;font-size:12px;font-weight:800;cursor:pointer;color:#334155}

.tab.active{border-color:#bfdbfe;background:#eff6ff;color:#2563eb}

.statline{display:flex;justify-content:space-between;gap:10px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:#64748b}

.count{font-weight:800;color:#2563eb}

.headtxt{font-size:11px;font-weight:800;margin:10px 0 6px}

.h1{color:#a16207}.h2{color:#166534}

.row{display:flex;justify-content:space-between;align-items:center;gap:10px;border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid #e5e7eb;background:#f9fafb}

.token{font-size:18px;font-weight:800;letter-spacing:2px;color:#2563eb}

.small{font-size:10px;color:#94a3b8;margin-top:3px}

.badge{font-size:10px;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap}

.win1{background:#fef3c7;color:#a16207}

.win2{background:#dcfce7;color:#166534}

.pending{background:#eef2f7;color:#64748b}

.empty{padding:24px 0;color:#64748b;font-size:13px;text-align:center;line-height:1.6}

.gridinfo{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

.miniinfo{border:1px solid #e5e7eb;background:#f8fafc;border-radius:12px;padding:10px;text-align:center}

.miniinfo .k{font-size:11px;color:#64748b;font-weight:700}

.miniinfo .v{font-size:18px;font-weight:800;color:#111827;margin-top:3px}

.visits-row{display:flex;gap:6px;margin-top:10px}
.visit-cell{flex:1;border:1px solid var(--line);border-radius:10px;background:#fff;padding:8px 4px;text-align:center}
.visit-label{font-size:9px;color:var(--muted);font-weight:700}
.visit-num{font-size:15px;font-weight:800;color:#2563eb;margin-top:2px}
.note{margin:-2px 0 10px;font-size:11px;color:#64748b;text-align:center}

.share-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.42);z-index:9998}
.share-sheet{display:none;position:fixed;left:0;right:0;bottom:0;z-index:9999;max-height:80vh;overflow:auto;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.14);padding:16px 14px 22px}
.share-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.share-title{font-size:16px;font-weight:800;color:#111827}
.share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sg-btn{appearance:none;border:1px solid #e5e7eb;border-radius:16px;background:#fff;padding:14px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;touch-action:manipulation}
.sg-btn:active{background:#f3f4f6;transform:scale(.97)}
.sg-icon{font-size:26px;line-height:1}
.sg-label{font-size:11px;font-weight:700;color:#374151;line-height:1.2}
.share-btn-main{appearance:none;border:none;border-radius:999px;background:#2563eb;color:#fff;font-size:15px;font-weight:800;padding:14px 28px;cursor:pointer;width:100%;touch-action:manipulation}
.share-btn-main:active{opacity:.8}


.blevel-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;margin-bottom:6px;font-size:12px}
.blevel-num{font-weight:700;color:#374151}
.blevel-amt{font-weight:800;color:#2563eb}
.blevel-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
.blevel-done{background:#dcfce7;color:#166534}
.blevel-pending{background:#fef3c7;color:#92400e}
.bpoints{margin-top:10px;padding:10px 12px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb}
.bpoints-title{font-size:11px;font-weight:800;color:#374151;margin-bottom:6px}
.bpoint{font-size:10px;color:#64748b;line-height:1.6;padding:2px 0}
.bpoint::before{content:"▸ ";color:#2563eb;font-weight:700}
.status-bar{display:flex;gap:6px;margin-bottom:8px}
.sbar-item{flex:1;display:flex;align-items:center;gap:6px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb;padding:7px 8px;cursor:pointer;touch-action:manipulation;min-width:0}
.sbar-item:active{background:#f3f4f6}
.sbar-icon{font-size:14px;line-height:1;flex-shrink:0}
.sbar-main{font-size:12px;font-weight:800;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-card{border:1px solid #fde68a;border-radius:14px;background:linear-gradient(135deg,#fffbeb,#fef3c7);padding:12px;margin-bottom:8px}
.mc-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mc-icon{font-size:18px;flex-shrink:0}
.mc-title{font-size:13px;font-weight:800;color:#92400e}
.mc-progress{margin-bottom:8px}
.mc-bar-bg{height:6px;border-radius:999px;background:#fde68a;overflow:hidden}
.mc-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#f59e0b,#d97706);transition:width .3s ease}
.mc-bar-text{font-size:10px;color:#92400e;font-weight:700;margin-top:3px;text-align:right}
.mc-stats{display:flex;gap:8px;margin-bottom:6px}
.mc-stats span{font-size:10px;font-weight:700;color:#6b7280}
.mc-rewards{background:#ffffffb3;border-radius:10px;padding:8px 10px;margin-bottom:8px}
.mc-reward{font-size:11px;color:#475569;line-height:1.6;padding:1px 0}
.mc-btn{appearance:none;border:none;border-radius:999px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:14px;font-weight:800;padding:12px 20px;cursor:pointer;width:100%;touch-action:manipulation;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.mc-btn:active{opacity:.85;transform:scale(.98)}
.mini-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.mgi-item{border:1px solid #e5e7eb;border-radius:12px;padding:8px 6px;text-align:center;cursor:pointer;touch-action:manipulation;background:#fff}
.mgi-item:active{background:#f9fafb;transform:scale(.97)}
.mgi-icon{font-size:16px;margin-bottom:2px}
.mgi-label{font-size:8px;font-weight:700;color:#94a3b8;margin-bottom:2px}
.mgi-value{font-size:10px;font-weight:800;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-link{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb;padding:8px 12px;cursor:pointer;touch-action:manipulation;font-size:11px;font-weight:700;color:#374151}
.wl-link:active{background:#f3f4f6}
.wl-link span:last-child{font-size:16px;color:#94a3b8}
@media (max-width:600px){

  .title{font-size:16px}

  .summary{gap:8px}

  .value{font-size:24px}

  .tabrow{flex-direction:column}

}

</style>

</head>

<body>

<div class="wrap"><div class="inner">

<div class="status-bar">
  <div class="sbar-item" onclick="showStreak()">
    <span class="sbar-icon">🔥</span>
    <span class="sbar-main" id="sbarJourney">যাত্রা শুরু</span>
  </div>
  <div class="sbar-item" onclick="myTokens()">
    <span class="sbar-icon">🎟️</span>
    <span class="sbar-main" id="totalCount">০</span>
  </div>
  <div class="sbar-item" onclick="showBonusInfo('net')">
    <span class="sbar-icon">💰</span>
    <span class="sbar-main">৳<span id="sumBonusNet">০</span></span>
  </div>
</div>

<div class="mission-card">
  <div class="mc-header">
    <span class="mc-icon">🚀</span>
    <span class="mc-title" id="mcTitle">লোড হচ্ছে...</span>
  </div>
  <div class="mc-progress">
    <div class="mc-bar-bg"><div class="mc-bar" id="mcBar" style="width:0%"></div></div>
    <div class="mc-bar-text" id="mcBarText">০/০ ক্লিক</div>
  </div>
  <div class="mc-stats">
    <span id="mcTokens">🎟️ ০ টোকেন</span>
    <span id="mcBonus">💰 ৳০ বোনাস</span>
  </div>
  <div class="mc-rewards" id="mcRewards"></div>
  <button type="button" class="mc-btn" onclick="openShareSheet()">📤 শেয়ার করে ক্লিক আনুন</button>
</div>

<div class="mini-grid">
  <div class="mgi-item" onclick="showRank()">
    <div class="mgi-icon">🏆</div>
    <div class="mgi-label">র‍্যাঙ্ক</div>
    <div class="mgi-value" id="rankDisplay">লোড হচ্ছে...</div>
  </div>
  <div class="mgi-item" onclick="showStreak()">
    <div class="mgi-icon">🔥</div>
    <div class="mgi-label">স্ট্রিক</div>
    <div class="mgi-value" id="streakDisplay">—</div>
  </div>
  <div class="mgi-item" onclick="showBadges()">
    <div class="mgi-icon">🎖️</div>
    <div class="mgi-label">ব্যাজ</div>
    <div class="mgi-value" id="badgeDisplay">লোড হচ্ছে...</div>
  </div>
</div>

<div class="wl-link" onclick="winners('daily')">
  <span>🏆 বিজয়ী দেখুন</span>
  <span>›</span>
</div>

</div></div>

<div id="flash"></div>

<div id="overlay" onclick="closeModal()"></div>

<div id="modal">

  <div class="modal-head"><div id="mtitle" class="modal-title"></div><button type="button" class="x" onclick="closeModal()">✕</button></div>

  <div id="mtabs"></div><div id="mbody"></div>

</div>

<div id="shareOverlay" class="share-overlay" onclick="closeShareSheet()"></div>

<div id="shareSheet" class="share-sheet">

  <div class="share-head"><div class="share-title">শেয়ার করুন</div><button type="button" class="x" onclick="closeShareSheet()">✕</button></div>

  <div id="shareGrid" class="share-grid"></div>

</div>

function visitBD(vd){var d=new Date(vd.replace(' ','T')+'+00:00');if(isNaN(d))return'';var ms=d.getTime()+21600000+d.getTimezoneOffset()*60000,x=new Date(ms);if(x.getHours()<6)x.setDate(x.getDate()-1);return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2)}

var BL=[1000,500,300,200,100,70,50,30,15,5];
var BRs=5,BRr=50;
function bs(){var d=gs(ks('bonus'),{tc:0,nu:0,lc:[],td:0,tv:0,tdv:0,wv:0,mv:0,vs:[],bt:0,ti:0});d.tc=+d.tc||0;d.nu=+d.nu||0;d.lc=Array.isArray(d.lc)?d.lc:[];d.td=+d.td||0;d.tv=+d.tv||0;d.tdv=+d.tdv||0;d.wv=+d.wv||0;d.mv=+d.mv||0;d.vs=Array.isArray(d.vs)?d.vs:[];d.bt=+d.bt||0;d.ti=+d.ti||0;return d}
function bsave(d){ss(ks('bonus'),d)}
function calcSB(){return (bs().tc||0)*BRs}
function calcRB(){return bs().tc*BRr}
function calcBT(){var c=bs().tc||0;return c*(c+1)/2}
function calcLB(){var d=bs(),t=0;d.lc.forEach(function(i){t+=BL[i]});return t}
function calcDD(){return bs().td}
function calcNB(){return Math.max(0,calcSB()+calcRB()+calcLB()-calcDD())}
var luckyM=[[3,1],[5,3],[10,7],[15,12],[20,20],[30,35],[50,60],[75,95],[100,135],[125,180],[150,235],[175,295],[200,360],[225,430],[250,510],[275,600],[300,700]];
function calcLK(){var tc=bs().tc||0,v=0;for(var i=0;i<luckyM.length;i++){if(tc>=luckyM[i][0])v=luckyM[i][1];else break}return v}
function calcPA(){
  var d=bs(),first=d.fv;
  if(!first)return 0;
  var diff=Math.floor((new Date()-new Date(first))/86400000)+1;
  return diff*Math.floor((d.tc||0)/5)
}

  }else if(next){

    barText=bn(tc)+'/'+bn(next.clicks)+' ক্লিক';

  $('mcBar').style.width=barPct+'%';
