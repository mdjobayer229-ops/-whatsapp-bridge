  tc.textContent=r.length;
  if(!r.length){g.classList.add('hidden');e.classList.remove('hidden');return}
  g.classList.remove('hidden');e.classList.add('hidden');
  g.innerHTML=r.map(c=>{
    const[ct,tl,ds,ul,ic]=c;const bn=ct.split('|')[1]||ct;
    return'<div class="card" onclick="window.open(\''+ul.replace(/'/g,"\\'")+'\',\'_blank\')"><div class="card-icon"><i class="fas '+ic+'"></i></div><div class="card-body"><div class="card-cat">'+bn+'</div><div class="card-title">'+tl+'</div><div class="card-desc">'+ds+'</div></div></div>'
  }).join('')
}
render();
let st;
s.addEventListener('input',function(){clearTimeout(st);st=setTimeout(()=>{const a=document.querySelector('.cat-btn.active');render(a?.dataset?.cat)},200)});
</script>
</body>
